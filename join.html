<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Join GuruFitness</title>
    <link rel="shortcut icon" href="assets/weightlifter.png" type="image/x-icon">
    <link rel="stylesheet" href="css/style.css" />
    <link rel="stylesheet" href="css/utils.css" />
  </head>

  <body class="join-body">
    <div class="join-container">
      <h2 class="text-center">JOIN GURUFITNESS</h2>
      <p class="text-center my-1">Provide your details</p>

      <div class="form-box">
        <form id="joinForm">
          <input type="text" id="name" placeholder="Name" required />

          <input type="email" id="email" placeholder="Email" required />

          <input type="text" id="phone" placeholder="Phone Number" required/>

          <button type="submit" class="btn">Submit</button>
        </form>
      </div>
    </div>

    <script src="js/join.js"></script>
  </body>
</html>
